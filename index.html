<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inquiry Demo</title>
    <style>
        /* 1. 字体定义：同时引入 BoldA 和 BoldC */
        @font-face {
            font-family: 'DominoA';
            src: url('DominoMono-BoldA.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'DominoC';
            src: url('DominoMono-BoldC.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        /* 基础字体类 */
        .font-a { font-family: 'DominoA', monospace; }
        .font-c { font-family: 'DominoC', monospace; }

        /* 2. 基础重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none; /* 禁用默认的页面缩放和滚动 */
            user-select: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            background-color: #FFFFFF; /* 全局背景白色 */
            overflow: hidden;
        }

        /* 界面容器公用属性：取消了原本的透明度淡出过渡，改为硬切 */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none; /* 默认隐藏 */
            align-items: center;
            justify-content: center;
        }

        .screen.active {
            display: flex; /* 激活时瞬间显示 */
        }

        /* 底部固定信息栏：全局统一格式 */
        .footer {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            padding: 0 30px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; /* 左中右三等分 */
            font-family: 'PingFangSC-Semibold', 'PingFang SC', -apple-system, sans-serif;
            font-size: 20px;
            font-weight: 600;
            z-index: 10;
            pointer-events: none; /* 防止遮挡交互手势 */
        }
        .footer .left { text-align: left; }
        .footer .center { text-align: center; }
        .footer .right { text-align: right; }

        /* ================= 界面 1 样式 ================= */
        
        #screen-1 {
            color: #6AA3E6; /* 界面 1 统一文字颜色 */
        }

        #grid-1 {
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background-image: 
                linear-gradient(to right, #F2F2F2 1px, transparent 1px),
                linear-gradient(to bottom, #F2F2F2 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center center;
            transform-origin: center center;
            z-index: 1;
            will-change: transform;
        }

        #text-1 {
            position: relative;
            z-index: 2;
            font-size: 2.5rem;
            text-align: center;
            line-height: 1.3; /* 行距为字号的1.3倍 */
            will-change: transform;
            transform-origin: center center;
        }

        /* ================= 界面 2 样式 ================= */
        
        #screen-2 {
            color: #FEA28F; /* 界面 2 统一文字颜色 */
        }

        #grid-2 {
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background-image: 
                linear-gradient(to right, #DAECED 1px, transparent 1px),
                linear-gradient(to bottom, #DAECED 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center center;
            z-index: 1;
        }

        #text-2 {
            position: relative;
            z-index: 2;
            font-size: 3rem;
            text-align: center;
            will-change: transform;
            transform-origin: top center; /* 拉伸从顶部开始固定 */
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        
        #text-2.dragging {
            transition: none;
        }

    </style>
</head>
<body>

    <!-- 界面 1 -->
    <div id="screen-1" class="screen active font-a">
        <div id="grid-1"></div>
        <div id="text-1">
            T<span class="font-c">A</span>KE<br>
            <span class="font-c">A</span><br>
            CL<span class="font-c">O</span>SER<br>
            L<span class="font-c">OO</span>K
        </div>
        <!-- 界面1的底部信息 -->
        <div class="footer">
            <span class="left">Test</span>
            <span class="center">Project Name</span>
            <span class="right">01</span>
        </div>
    </div>

    <!-- 界面 2 -->
    <div id="screen-2" class="screen font-a">
        <div id="grid-2"></div>
        <div id="text-2">
            G<span class="font-c">O</span> D<span class="font-c">O</span>WN
        </div>
        <!-- 界面2的底部信息 -->
        <div class="footer">
            <span class="left">Test</span>
            <span class="center">Project Name</span>
            <span class="right">02</span>
        </div>
    </div>

    <script>
        // === 全局状态 ===
        let currentScreen = 1;

        // === 界面 1：双指缩放逻辑 ===
        const screen1 = document.getElementById('screen-1');
        const grid1 = document.getElementById('grid-1');
        const text1 = document.getElementById('text-1');
        
        let initialDistance = 0;
        let currentGridScale = 1;
        let currentTextScale = 1;
        const TEXT_SUCCESS_THRESHOLD = 3.5; // 文字放大到多少倍算完成 (可根据手机屏幕微调)

        function getDistance(touches) {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        document.addEventListener('touchstart', (e) => {
            if (currentScreen === 1 && e.touches.length === 2) {
                initialDistance = getDistance(e.touches);
            }
        });

        document.addEventListener('touchmove', (e) => {
            if (currentScreen !== 1) return;
            e.preventDefault();

            if (e.touches.length === 2 && initialDistance > 0) {
                const currentDist = getDistance(e.touches);
                const delta = currentDist / initialDistance;

                if (delta > 1) {
                    // 【向外捏合】文字不变，网格放大
                    currentGridScale = delta;
                    grid1.style.transform = `scale(${currentGridScale})`;
                    text1.style.transform = `scale(${currentTextScale})`;
                } else if (delta < 1) {
                    // 【向内捏合】网格不变，文字放大
                    currentTextScale = Math.max(1, 1 / delta); 
                    text1.style.transform = `scale(${currentTextScale})`;
                    grid1.style.transform = `scale(${currentGridScale})`;

                    // 达到阈值，瞬间硬切到界面 2
                    if (currentTextScale > TEXT_SUCCESS_THRESHOLD) {
                        transitionToScreen2();
                    }
                }
            }
        }, { passive: false });

        document.addEventListener('touchend', (e) => {
            if (currentScreen === 1 && e.touches.length < 2) {
                initialDistance = 0; 
            }
        });

        // === 瞬间切换界面的逻辑 ===
        function transitionToScreen2() {
            currentScreen = 2; // 锁定状态，防止重复触发
            
            // 移除原本的淡出，直接切换 active 状态
            // 这会导致网格颜色、字体颜色瞬间改变，视觉冲击力更强
            screen1.classList.remove('active');
            document.getElementById('screen-2').classList.add('active');
        }

        // === 界面 2：单指滑动逻辑 ===
        const text2 = document.getElementById('text-2');
        let startY = 0;
        let currentTranslateY = 0;

        document.addEventListener('touchstart', (e) => {
            if (currentScreen === 2 && e.touches.length === 1) {
                startY = e.touches[0].clientY;
                text2.classList.add('dragging'); 
            }
        });

        document.addEventListener('touchmove', (e) => {
            if (currentScreen !== 2 || e.touches.length !== 1) return;
            e.preventDefault();

            const currentY = e.touches[0].clientY;
            const deltaY = currentY - startY;

            if (deltaY > 0) {
                // 【向下滑动】文字物理拉长
                const stretchFactor = 1 + (deltaY / 150); 
                text2.style.transform = `scaleY(${stretchFactor})`;
            } else {
                // 【向上滑动】推走文字
                currentTranslateY = deltaY; 
                text2.style.transform = `translateY(${currentTranslateY}px)`;

                if (Math.abs(currentTranslateY) > window.innerHeight / 2) {
                    text2.style.transition = "opacity 0.2s";
                    text2.style.opacity = 0;
                    currentScreen = 3; 
                }
            }
        }, { passive: false });

        document.addEventListener('touchend', (e) => {
            if (currentScreen === 2) {
                text2.classList.remove('dragging'); 
                
                // 没推到位就橡皮筋回弹
                if (currentTranslateY > -(window.innerHeight / 2)) {
                    text2.style.transform = `scaleY(1) translateY(0px)`;
                    currentTranslateY = 0;
                }
            }
        });

    </script>
</body>
</html>
