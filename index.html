<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inquiry Demo - Reflexivity</title>
    <style>
        /* 1. 引入两套不同的字体 */
        @font-face {
            font-family: 'DominoCustomA';
            src: url('DominoMono-BoldA.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'DominoCustomC';
            src: url('DominoMono-BoldC.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        /* 快捷应用不同字体的 class */
        .font-a { font-family: 'DominoCustomA', monospace; }
        .font-c { font-family: 'DominoCustomC', monospace; }

        /* 2. 定义全局颜色变量（方便第二屏瞬间切换） */
        :root {
            --color-bg: #FFFFFF;
            --color-grid: #F2F2F2;
            --color-text: #6AA3E6;
        }

        /* 当切换到界面2时，瞬间改变颜色变量 */
        body.theme-screen-2 {
            --color-grid: #F2F2F2;
            --color-text: #FEA28F;
        }

        /* 3. 基础重置 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100dvh; /* 核心修复：使用 dvh (动态视口高度) 完美适配手机浏览器 */
            background-color: var(--color-bg);
            color: var(--color-text);
            overflow: hidden; /* 防止出现任何滚动条 */
            font-family: 'DominoCustomA', monospace;
            box-sizing: border-box;
            touch-action: none; 
            user-select: none;
            -webkit-user-select: none; /* 禁用苹果手机长按选中 */
        }

        /* ================= 全局层与底部信息栏 ================= */
        
        /* 辅助网格层，置于最底层 */
        .grid-bg {
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%; 
            background-image: 
                linear-gradient(to right, var(--color-grid) 1px, transparent 1px),
                linear-gradient(to bottom, var(--color-grid) 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center center;
            transform-origin: center center;
            z-index: 1;
            will-change: transform;
        }

        /* 底部状态栏，独立放置于界面之外，保证不干扰文字居中 */
        .footer {
            position: fixed;
            bottom: 30px;
            left: 30px;
            right: 30px;
            display: flex;
            justify-content: space-between;
            font-family: 'PingFangSC-Semibold', 'PingFang SC', -apple-system, sans-serif;
            font-size: 10px;
            z-index: 10;
            pointer-events: none; 
        }

        .footer .center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        /* ================= 界面容器 (专门用于完美居中) ================= */
        .screen {
            position: fixed; /* 核心修复：改为 fixed，完美覆盖整个屏幕 */
            top: 0; left: 0;
            width: 100vw; 
            height: 100dvh; 
            display: none; /* 默认隐藏 */
            flex-direction: column; /* 核心修复：内部元素纵向排列 */
            align-items: center; /* 左右居中 */
            justify-content: center; /* 上下居中 */
            z-index: 2;
        }

        .screen.active {
            display: flex; /* 当带 active 时，变为 flex 布局 */
        }

        /* ================= 界面 1 样式 ================= */
        
        #text-1 {
            font-size: 2rem;
            line-height: 1.3;
            letter-spacing: 8px;
            text-align: center;
            will-change: transform;
            transform-origin: center center;
        }

        /* ================= 界面 2 样式 ================= */
        
        #text-2 {
            font-size: 4rem;
            letter-spacing: 8px;
            text-align: center;
            will-change: transform;
            transform-origin: top center; 
        }

    </style>
</head>
<body>

    <!-- 全局背景网格 -->
    <div class="grid-bg" id="grid"></div>

    <!-- 界面 1 -->
    <div id="screen-1" class="screen active">
        <div id="text-1">
            <div class="font-a">T<span class="font-c">A</span>KE</div>
            <div class="font-c">A</div>
            <div class="font-a">CL<span class="font-c">O</span>SER</div>
            <div class="font-a">L<span class="font-c">O</span><span class="font-c">O</span>K</div>
        </div>
    </div>

    <!-- 界面 2 -->
    <div id="screen-2" class="screen">
        <div id="text-2">
            <span class="font-a">G</span><span class="font-c">O</span> <span class="font-a">D</span><span class="font-c">O</span><span class="font-a">WN</span>
        </div>
    </div>

    <!-- 全局底部信息栏 (统一由 JavaScript 更新序号) -->
    <div class="footer">
        <span>Test</span>
        <span class="center">Project Name</span>
        <span id="page-num">01</span>
    </div>

    <script>
        // === 全局状态 ===
        let currentScreen = 1;

        // === 界面 1：双指缩放逻辑 ===
        const screen1 = document.getElementById('screen-1');
        const screen2 = document.getElementById('screen-2');
        const grid = document.getElementById('grid');
        const text1 = document.getElementById('text-1');
        const pageNum = document.getElementById('page-num'); 
        
        let initialDistance = 0;
        let currentGridScale = 1;
        let currentTextScale = 1;
        
        // 【新增】：添加记忆变量，记录上一次松手时的缩放比例
        let lastGridScale = 1;
        let lastTextScale = 1;
        
        const TEXT_SUCCESS_THRESHOLD = 4.5; 

        function getDistance(touches) {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        document.addEventListener('touchstart', (e) => {
            if (currentScreen === 1 && e.touches.length === 2) {
                initialDistance = getDistance(e.touches);
            }
        });

        document.addEventListener('touchmove', (e) => {
            if (currentScreen !== 1) return;
            e.preventDefault();

            if (e.touches.length === 2 && initialDistance > 0) {
                const currentDist = getDistance(e.touches);
                const delta = currentDist / initialDistance;

                if (delta > 1) {
                    // 【修改】：在上次的网格比例基础上继续放大
                    currentGridScale = lastGridScale * delta;
                    grid.style.transform = `scale(${currentGridScale})`;
                    // 文字保持当前的比例不变
                    text1.style.transform = `scale(${currentTextScale})`;
                } else if (delta < 1) {
                    // 【修改】：在上次的文字比例基础上继续放大
                    // delta 越小，1/delta 越大，将其乘以上次记录的比例
                    currentTextScale = Math.max(1, lastTextScale * (1 / delta)); 
                    text1.style.transform = `scale(${currentTextScale})`;
                    grid.style.transform = `scale(${currentGridScale})`;

                    if (currentTextScale > TEXT_SUCCESS_THRESHOLD) {
                        transitionToScreen2();
                    }
                }
            }
        }, { passive: false });

        document.addEventListener('touchend', (e) => {
            if (currentScreen === 1 && e.touches.length < 2) {
                initialDistance = 0; 
                // 【新增】：当手指松开时，把当前的比例保存到记忆变量里
                lastGridScale = currentGridScale;
                lastTextScale = currentTextScale;
            }
        });

        // === 界面瞬间切场逻辑 === (后面的代码保持不变...)

        // === 界面瞬间切场逻辑 ===
        function transitionToScreen2() {
            currentScreen = 2; 
            
            // 切换主题颜色
            document.body.classList.add('theme-screen-2');
            
            // 切换页面显示
            screen1.classList.remove('active');
            screen2.classList.add('active');

            // 动态将底部的序号从 01 改为 02
            pageNum.innerText = '02';

            // 恢复网格大小
            grid.style.transform = `scale(1)`;
        }

        // === 界面 2：拉伸与推动刷新逻辑 ===
        const text2 = document.getElementById('text-2');
        let startY = 0;
        let currentScaleY = 1;
        let lastScaleY = 1;
        let currentTranslateY = 0;
        let lastTranslateY = 0;

        document.addEventListener('touchstart', (e) => {
            if (currentScreen === 2 && e.touches.length === 1) {
                startY = e.touches[0].clientY;
            }
        });

        document.addEventListener('touchmove', (e) => {
            if (currentScreen !== 2 || e.touches.length !== 1) return;
            e.preventDefault();

            const currentY = e.touches[0].clientY;
            const deltaY = currentY - startY;

            if (deltaY > 0) {
                // 下拉拉长
                currentScaleY = lastScaleY + (deltaY / 150); 
                text2.style.transform = `translateY(${lastTranslateY}px) scaleY(${currentScaleY})`;
            } else {
                // 上推位移
                currentTranslateY = lastTranslateY + deltaY; 
                text2.style.transform = `translateY(${currentTranslateY}px) scaleY(${lastScaleY})`;

                if (Math.abs(currentTranslateY) > window.innerHeight / 2) {
                    location.reload(); 
                }
            }
        }, { passive: false });

        document.addEventListener('touchend', (e) => {
            if (currentScreen === 2) {
                if (currentScaleY !== lastScaleY) {
                    lastScaleY = currentScaleY;
                }
                if (currentTranslateY !== lastTranslateY) {
                    lastTranslateY = currentTranslateY;
                }
            }
        });

    </script>
</body>
</html>
