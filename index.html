<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inquiry Demo - Reflexivity</title>
    <style>
        /* 1. 字体定义 */
        @font-face {
            font-family: 'DominoCustomA';
            src: url('DominoMono-BoldA.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'DominoCustomC';
            src: url('DominoMono-BoldC.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        .font-a { font-family: 'DominoCustomA', monospace; }
        .font-c { font-family: 'DominoCustomC', monospace; }

        /* 2. 全局颜色变量 */
        :root {
            --color-bg: #FFFFFF;
            --color-grid: #F2F2F2;
            --color-text: #6AA3E6;
            --color-footer: #000000;
        }

        body.theme-screen-2 {
            --color-grid: #F2F2F2;
            --color-text: #FEA28F;
        }

        body.theme-screen-3 {
            --color-grid: #F2F2F2;
            --color-text: #000000;
            --color-footer: #898989; /* 界面3底部文字颜色 */
        }

        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100dvh;
            background-color: var(--color-bg);
            color: var(--color-text);
            overflow: hidden;
            touch-action: none; 
            user-select: none;
            -webkit-user-select: none;
        }

        /* 背景网格 */
        .grid-bg {
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%; 
            background-image: 
                linear-gradient(to right, var(--color-grid) 1px, transparent 1px),
                linear-gradient(to bottom, var(--color-grid) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 1;
        }

        .footer {
            position: fixed;
            bottom: 30px; left: 30px; right: 30px;
            display: flex; justify-content: space-between;
            font-family: 'PingFangSC-Semibold', sans-serif;
            font-size: 10px;
            color: var(--color-footer);
            z-index: 10;
        }

        .footer .center { position: absolute; left: 50%; transform: translateX(-50%); }

        .screen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100dvh;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .screen.active { display: flex; }

        /* 界面 1 样式 */
        #text-1 {
            font-size: 2rem;
            line-height: 1.3;
            letter-spacing: 8px;
            text-align: center;
            will-change: transform;
        }

        /* 界面 2 样式 */
        #text-2 {
            position: absolute;
            bottom: 10dvh; /* 初始位置偏下 */
            left: 50%;
            transform: translateX(-50%);
            font-size: 3.5rem;
            letter-spacing: 15px;
            text-align: center;
            will-change: transform;
            transform-origin: bottom center; /* 向往拉时，底部固定，往上拉伸 */
            opacity: 0;
            transition: opacity 1s;
        }

        /* 界面 3 样式 */
        #text-3 {
            font-size: 400px; /* 初始巨大 */
            line-height: 400px;
            letter-spacing: 20px;
            text-align: center;
            will-change: transform;
            opacity: 0;
            transition: opacity 1s;
            white-space: nowrap;
        }

        .visible { opacity: 1 !important; pointer-events: auto !important; }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <!-- 界面 1 -->
    <div id="screen-1" class="screen active">
        <div id="text-1">
            <div class="font-a">T<span class="font-c">A</span>KE</div>
            <div class="font-c">A</div>
            <div class="font-a">CL<span class="font-c">O</span>SER</div>
            <div class="font-a">L<span class="font-c">O</span><span class="font-c">O</span>K</div>
        </div>
    </div>

    <!-- 界面 2 -->
    <div id="screen-2" class="screen">
        <div id="text-2">
            <span class="font-a">G</span><span class="font-c">O</span> 
            <span class="font-c">U</span><span class="font-a">P</span>
        </div>
    </div>

    <!-- 界面 3 -->
    <div id="screen-3" class="screen">
        <div id="text-3" class="font-a">
            Minimize<br>Me
        </div>
    </div>

    <div class="footer">
        <span>Test</span>
        <span class="center">Project Name</span>
        <span id="page-num">01</span>
    </div>

    <script>
        let currentScreen = 1;
        let isTransitioning = false;

        const screen1 = document.getElementById('screen-1');
        const screen2 = document.getElementById('screen-2');
        const screen3 = document.getElementById('screen-3');
        const text1 = document.getElementById('text-1');
        const text2 = document.getElementById('text-2');
        const text3 = document.getElementById('text-3');
        const pageNum = document.getElementById('page-num');

        // 通用距离计算
        function getDistance(touches) {
            return Math.sqrt(Math.pow(touches[0].clientX - touches[1].clientX, 2) + Math.pow(touches[0].clientY - touches[1].clientY, 2));
        }

        // --- 界面 1 逻辑 ---
        let initialDist1 = 0;
        let lastTextScale1 = 1;
        let currentTextScale1 = 1;

        document.addEventListener('touchstart', (e) => {
            if (currentScreen === 1 && e.touches.length === 2) initialDist1 = getDistance(e.touches);
            if (currentScreen === 2 && e.touches.length === 1) startY2 = e.touches[0].clientY;
            if (currentScreen === 3 && e.touches.length === 2) initialDist3 = getDistance(e.touches);
        });

        document.addEventListener('touchmove', (e) => {
            if (isTransitioning) return;
            e.preventDefault();

            // 界面 1 交互
            if (currentScreen === 1 && e.touches.length === 2) {
                let dist = getDistance(e.touches);
                let delta = dist / initialDist1;
                if (delta < 1) { // 缩小手势 -> 文字放大
                    currentTextScale1 = lastTextScale1 * (1 / delta);
                    text1.style.transform = `scale(${currentTextScale1})`;
                    if (currentTextScale1 > 5) transitionTo2();
                }
            }

            // 界面 2 交互 (往下拽 -> 往上升 + 拉伸)
            if (currentScreen === 2 && e.touches.length === 1) {
                let deltaY = e.touches[0].clientY - startY2;
                if (deltaY > 0) { // 往下拽
                    currentTranslateY2 = lastTranslateY2 - deltaY; // 坐标减小即往上升
                    currentScaleY2 = lastScaleY2 + (deltaY / 100); // 向上拉伸
                    text2.style.transform = `translateX(-50%) translateY(${currentTranslateY2}px) scaleY(${currentScaleY2})`;
                    if (Math.abs(currentTranslateY2) > window.innerHeight * 0.8) transitionTo3();
                }
            }

            // 界面 3 交互 (放大手势 -> 文字缩小)
            if (currentScreen === 3 && e.touches.length === 2) {
                let dist = getDistance(e.touches);
                let delta = dist / initialDist3;
                if (delta > 1) { // 放大手势
                    currentScale3 = lastScale3 * (1 / delta);
                    text3.style.transform = `scale(${currentScale3})`;
                    if (currentScale3 < 0.05) location.reload(); // 缩小到极点刷新
                }
            }
        }, { passive: false });

        document.addEventListener('touchend', (e) => {
            if (currentScreen === 1) { lastTextScale1 = currentTextScale1; initialDist1 = 0; }
            if (currentScreen === 2) { lastTranslateY2 = currentTranslateY2; lastScaleY2 = currentScaleY2; }
            if (currentScreen === 3) { lastScale3 = currentScale3; initialDist3 = 0; }
        });

        // --- 过渡逻辑 ---

        function transitionTo2() {
            if (isTransitioning) return;
            isTransitioning = true;
            text1.style.opacity = 0;
            document.body.classList.add('theme-screen-2');
            setTimeout(() => {
                screen1.classList.remove('active');
                screen2.classList.add('active');
                pageNum.innerText = '02';
                setTimeout(() => {
                    text2.classList.add('visible');
                    currentScreen = 2;
                    isTransitioning = false;
                }, 500);
            }, 1000);
        }

        let startY2 = 0, currentTranslateY2 = 0, lastTranslateY2 = 0, currentScaleY2 = 1, lastScaleY2 = 1;

        function transitionTo3() {
            if (isTransitioning) return;
            isTransitioning = true;
            text2.style.opacity = 0;
            document.body.classList.add('theme-screen-3');
            setTimeout(() => {
                screen2.classList.remove('active');
                screen3.classList.add('active');
                pageNum.innerText = '03';
                setTimeout(() => {
                    text3.classList.add('visible');
                    currentScreen = 3;
                    isTransitioning = false;
                }, 500);
            }, 1000);
        }

        let initialDist3 = 0, lastScale3 = 1, currentScale3 = 1;

    </script>
</body>
</html>
