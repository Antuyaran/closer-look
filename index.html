<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Take a closer look</title>
    <style>
        /* 1. 字体定义放在最前 */
        @font-face {
            font-family: 'DominoCustom'; 
            src: url('DominoMono-BoldC.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        * { touch-action: none; } 

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #050505;
            overflow: hidden;
        }

        #text {
            color: #ffffff;
            /* 使用你的自定义字体 */
            font-family: 'DominoCustom', monospace; 
            font-size: 3rem;
            letter-spacing: 2px;
            will-change: transform;
            transition: transform 0.1s ease-out, opacity 0.1s ease-out;
            text-align: center;
            user-select: none;
        }
    </style>
</head>
<body>

    <div id="text">Take a closer look</div>

    <script>
        const text = document.getElementById('text');
        let initialDistance = 0; 
        let currentScale = 1;    
        let lastScale = 1;       

        function getDistance(touches) {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        // 双击交互
        document.addEventListener('dblclick', () => {
            currentScale *= 0.4; 
            currentScale = Math.max(0.02, currentScale);
            lastScale = currentScale;

            text.style.transform = `scale(${currentScale})`;
            text.style.opacity = Math.max(0.1, currentScale);

            // 弹射动画效果
            text.style.transition = "transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.5s";
            setTimeout(() => {
                text.style.transition = "transform 0.1s ease-out, opacity 0.1s ease-out";
            }, 500);
        });

        // 缩放手势开始
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                initialDistance = getDistance(e.touches);
            }
        });

        // 缩放手势进行中
        document.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && initialDistance > 0) {
                e.preventDefault(); 
                const newDistance = getDistance(e.touches);
                const zoomFactor = newDistance / initialDistance;

                // 反向缩放逻辑
                let newScale = lastScale * (1 / zoomFactor);
                newScale = Math.max(0.01, Math.min(newScale, 3)); 

                currentScale = newScale;
                text.style.transform = `scale(${currentScale})`;
                text.style.opacity = Math.max(0.1, currentScale); 
            }
        }, { passive: false });

        // 手势结束
        document.addEventListener('touchend', (e) => {
            if (e.touches.length < 2) {
                lastScale = currentScale; 
                initialDistance = 0;
            }
        });
    </script>
</body>
</html>
