<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inquiry Demo</title>
    <style>
        /* 1. 字体定义 */
        @font-face {
            font-family: 'DominoCustom';
            src: url('DominoMono-BoldC.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        /* 2. 基础重置与极简风格 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none; /* 禁用默认的页面缩放和滚动 */
            user-select: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            background-color: #0a0a0a; /* 极深灰，接近黑 */
            overflow: hidden;
            font-family: 'DominoCustom', monospace;
            color: #ffffff;
        }

        /* 界面容器公用属性 */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease-in-out;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* ================= 界面 1 样式 ================= */
        
        /* 辅助网格层：画十字参考线 */
        .grid-bg {
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%; /* 足够大以便缩放 */
            background-image: 
                linear-gradient(to right, #2a2a2a 1px, transparent 1px),
                linear-gradient(to bottom, #2a2a2a 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: center center;
            transform-origin: center center;
            z-index: 1;
            will-change: transform;
        }

        #text-1 {
            position: relative;
            z-index: 2;
            font-size: 2rem;
            letter-spacing: 2px;
            text-align: center;
            will-change: transform, opacity;
            transform-origin: center center;
        }

        /* ================= 界面 2 样式 ================= */
        
        #text-2 {
            font-size: 3rem;
            letter-spacing: 4px;
            text-align: center;
            will-change: transform;
            transform-origin: top center; /* 拉伸从顶部开始固定 */
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); /* 松手时的回弹动画 */
        }
        
        /* 当手指触摸时，移除过渡动画以保证跟手 */
        #text-2.dragging {
            transition: none;
        }

    </style>
</head>
<body>

    <!-- 界面 1 -->
    <div id="screen-1" class="screen active">
        <div class="grid-bg" id="grid"></div>
        <div id="text-1">TAKE A CLOSER LOOK</div>
    </div>

    <!-- 界面 2 -->
    <div id="screen-2" class="screen">
        <div id="text-2">GO DOWN</div>
    </div>

    <script>
        // === 全局状态 ===
        let currentScreen = 1;

        // === 界面 1：双指缩放逻辑 ===
        const screen1 = document.getElementById('screen-1');
        const grid = document.getElementById('grid');
        const text1 = document.getElementById('text-1');
        
        let initialDistance = 0;
        let currentGridScale = 1;
        let currentTextScale = 1;
        const TEXT_SUCCESS_THRESHOLD = 4.5; // 文字放大到多少倍算完成

        function getDistance(touches) {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        document.addEventListener('touchstart', (e) => {
            if (currentScreen === 1 && e.touches.length === 2) {
                initialDistance = getDistance(e.touches);
            }
        });

        document.addEventListener('touchmove', (e) => {
            if (currentScreen !== 1) return;
            e.preventDefault();

            if (e.touches.length === 2 && initialDistance > 0) {
                const currentDist = getDistance(e.touches);
                const delta = currentDist / initialDistance;

                if (delta > 1) {
                    // 【Pinch Out】双指向外（常规放大）：文字不变，网格放大（靠近）
                    currentGridScale = delta;
                    grid.style.transform = `scale(${currentGridScale})`;
                    // 文字保持比例 1
                    text1.style.transform = `scale(${currentTextScale})`;
                } else if (delta < 1) {
                    // 【Pinch In】双指向内（常规缩小）：网格不变，文字放大
                    // delta 越小，倒数越大
                    currentTextScale = Math.max(1, 1 / delta); 
                    text1.style.transform = `scale(${currentTextScale})`;
                    grid.style.transform = `scale(${currentGridScale})`;

                    // 检查是否达到阈值，触发界面切换
                    if (currentTextScale > TEXT_SUCCESS_THRESHOLD) {
                        transitionToScreen2();
                    }
                }
            }
        }, { passive: false });

        document.addEventListener('touchend', (e) => {
            if (currentScreen === 1 && e.touches.length < 2) {
                initialDistance = 0; // 重置初始距离
                // 这里我们不保留进度，松手就停在当前状态，或者你可以加入自动回弹
            }
        });

        // === 界面切换逻辑 ===
        function transitionToScreen2() {
            currentScreen = 2; // 锁定状态，防止重复触发
            
            // 文字淡出
            text1.style.transition = "opacity 0.5s, transform 0.5s";
            text1.style.opacity = "0";
            text1.style.transform = `scale(${currentTextScale * 1.5})`; // 伴随淡出再放大一点点

            setTimeout(() => {
                screen1.classList.remove('active');
                document.getElementById('screen-2').classList.add('active');
            }, 800);
        }


        // === 界面 2：单指滑动逻辑 ===
        const text2 = document.getElementById('text-2');
        let startY = 0;
        let currentTranslateY = 0;

        document.addEventListener('touchstart', (e) => {
            if (currentScreen === 2 && e.touches.length === 1) {
                startY = e.touches[0].clientY;
                text2.classList.add('dragging'); // 移除动画，让拉伸完全跟手
            }
        });

        document.addEventListener('touchmove', (e) => {
            if (currentScreen !== 2 || e.touches.length !== 1) return;
            e.preventDefault();

            const currentY = e.touches[0].clientY;
            const deltaY = currentY - startY;

            if (deltaY > 0) {
                // 【向下滑动】（常规看上面内容）：文字拉长
                // deltaY 是向下的像素值，除以一个系数作为拉伸倍数
                const stretchFactor = 1 + (deltaY / 150); 
                text2.style.transform = `scaleY(${stretchFactor})`;
            } else {
                // 【向上滑动】（常规看下面内容）：文字被推走
                currentTranslateY = deltaY; // deltaY 是负数
                text2.style.transform = `translateY(${currentTranslateY}px)`;

                // 如果推得足够高（比如超过屏幕高度一半），视为完成
                if (Math.abs(currentTranslateY) > window.innerHeight / 2) {
                    text2.style.opacity = 0;
                    text2.style.transition = "opacity 0.5s, transform 0.5s";
                    // 这里可以继续写 transitionToScreen3 的逻辑
                    setTimeout(() => alert("Demo Complete! 所有的交互习惯都被打破了。"), 500);
                    currentScreen = 3; // 结束响应
                }
            }
        }, { passive: false });

        document.addEventListener('touchend', (e) => {
            if (currentScreen === 2) {
                text2.classList.remove('dragging'); // 恢复动画
                
                // 松手时，如果没有被完全推走，像橡皮筋一样弹回原位
                if (currentTranslateY > -(window.innerHeight / 2)) {
                    text2.style.transform = `scaleY(1) translateY(0px)`;
                    currentTranslateY = 0;
                }
            }
        });

    </script>
</body>
</html>
